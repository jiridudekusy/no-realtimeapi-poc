# Production docker-compose — pulls pre-built image from GitHub Container Registry
# Usage:
#   1. cp .env.example .env && edit .env with your API keys
#   2. docker compose -f docker-compose.prod.yml up -d
#   3. docker compose -f docker-compose.prod.yml exec agent claude login
#   4. Open http://localhost:3001

services:
  livekit:
    image: livekit/livekit-server
    command: --config /etc/livekit.yaml --dev
    ports:
      - "127.0.0.1:7880:7880"
      - "127.0.0.1:7881:7881"
      - "127.0.0.1:50000-50060:50000-50060/udp"
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:7880"]
      interval: 3s
      timeout: 2s
      retries: 10
      start_period: 5s

  agent:
    image: ghcr.io/jiridudekusy/no-realtimeapi-poc:latest
    env_file: .env
    ports:
      - "127.0.0.1:3001:3001"
    environment:
      - LIVEKIT_URL=ws://livekit:7880
    volumes:
      - claude-auth:/home/node/.claude
    depends_on:
      livekit:
        condition: service_healthy
    restart: unless-stopped

volumes:
  claude-auth:
