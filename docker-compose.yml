services:
  livekit:
    image: livekit/livekit-server
    command: --config /etc/livekit.yaml --dev
    ports:
      - "127.0.0.1:7880:7880"
      - "127.0.0.1:7881:7881"
      - "50000-50060:50000-50060/udp"
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml:ro
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:7880"]
      interval: 3s
      timeout: 2s
      retries: 10
      start_period: 5s

  agent:
    build: .
    env_file: .env
    ports:
      - "3001:3001"
    environment:
      - LIVEKIT_URL=ws://livekit:7880
    volumes:
      - claude-auth:/home/node/.claude
      - ./src:/app/src
      - ./web:/app/web
    depends_on:
      livekit:
        condition: service_healthy
    restart: unless-stopped

volumes:
  claude-auth:
