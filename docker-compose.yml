services:
  livekit:
    image: livekit/livekit-server
    entrypoint: ["sh", "-c", "sed s/NODE_IP_PLACEHOLDER/$LIVEKIT_NODE_IP/ /etc/livekit.yaml.template > /tmp/livekit.yaml && exec /livekit-server --config /tmp/livekit.yaml --dev"]
    environment:
      - LIVEKIT_NODE_IP=${LIVEKIT_NODE_IP:-127.0.0.1}
    ports:
      - "127.0.0.1:7880:7880"
      - "127.0.0.1:7881:7881"
      - "127.0.0.1:50000-50060:50000-50060/udp"
    volumes:
      - ./livekit.yaml.template:/etc/livekit.yaml.template:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:7880"]
      interval: 3s
      timeout: 2s
      retries: 10
      start_period: 5s

  agent:
    build: .
    env_file: .env
    ports:
      - "127.0.0.1:3001:3001"
    environment:
      - LIVEKIT_URL=ws://livekit:7880
    volumes:
      - claude-auth:/home/node/.claude
      - ./src:/app/src
      - ./web:/app/web
    depends_on:
      livekit:
        condition: service_healthy
    restart: unless-stopped

volumes:
  claude-auth:
